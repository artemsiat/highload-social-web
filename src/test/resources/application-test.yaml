spring:
  config:
    import: ""
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
    hikari:
      schema: PUBLIC
  flyway:
    enabled: true
    locations: classpath:db/migration/test
    default-schema: PUBLIC
  docker:
    compose:
      enabled: false

app:
  test-data:
    max-allowed-records: 10000000
    default-batch-size: 1000000
  jwt:
    secret: test-secret-key-for-jwt-signing-must-be-at-least-256-bits-long
    expiration-ms: 86400000
