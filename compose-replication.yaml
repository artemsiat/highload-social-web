# compose-replication.yaml
services:
  primary:
    image: postgres:16
    environment:
      POSTGRES_DB: social
      POSTGRES_USER: social_user
      POSTGRES_PASSWORD: social_pass
    ports:
      - "5433:5432"
    volumes:
      - ./docker/replication/init-primary.sh:/docker-entrypoint-initdb.d/init-primary.sh
      - primary_data:/var/lib/postgresql/data
    command: >
      postgres
      -c wal_level=replica
      -c max_wal_senders=4
      -c max_replication_slots=4
      -c wal_keep_size=256MB
      -c hot_standby=on
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U social_user -d social"]
      interval: 5s
      timeout: 3s
      retries: 10

  replica1:
    image: postgres:16
    environment:
      PGDATA: /var/lib/postgresql/data/pgdata
      PRIMARY_HOST: primary
      REPLICATION_USER: replicator
      REPLICATION_PASSWORD: replicator_pass
    ports:
      - "5434:5432"
    volumes:
      - ./docker/replication/entrypoint-replica.sh:/entrypoint-replica.sh
      - replica1_data:/var/lib/postgresql/data
    entrypoint: /entrypoint-replica.sh
    command: ["postgres", "-c", "hot_standby=on"]
    depends_on:
      primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 5s
      timeout: 3s
      retries: 10

  replica2:
    image: postgres:16
    environment:
      PGDATA: /var/lib/postgresql/data/pgdata
      PRIMARY_HOST: primary
      REPLICATION_USER: replicator
      REPLICATION_PASSWORD: replicator_pass
    ports:
      - "5435:5432"
    volumes:
      - ./docker/replication/entrypoint-replica.sh:/entrypoint-replica.sh
      - replica2_data:/var/lib/postgresql/data
    entrypoint: /entrypoint-replica.sh
    command: ["postgres", "-c", "hot_standby=on"]
    depends_on:
      primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  primary_data:
  replica1_data:
  replica2_data:
